<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Tue Le</title>
    <meta name="description" content="Page not found on Tue Le's personal website." />
    <meta name="color-scheme" content="dark light" />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("site-theme");
          const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", savedTheme || systemTheme);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./" aria-label="Go to homepage">
          <span class="brand-name">Tue Le</span>
          <span class="brand-role">AI researcher</span>
        </a>

        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch color mode" aria-pressed="true">
          <span>Theme</span>
          <strong id="themeToggleValue">Dark</strong>
        </button>
      </div>
    </header>

    <main class="hero">
      <div class="container">
        <div class="hero-copy">
          <p class="eyebrow">404</p>
          <h1>Page not found</h1>
          <p class="hero-body">
            This page does not exist. The main site still has the overview, publications, experience, and resume.
          </p>
          <div class="hero-actions">
            <a class="button button-primary" href="./">Go back home</a>
          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
