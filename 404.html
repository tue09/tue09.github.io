<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Le Dinh Tri Tue</title>
    <meta name="description" content="Page not found on Le Dinh Tri Tue's personal website." />
    <meta name="color-scheme" content="light dark" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("site-theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-theme", saved || (prefersDark ? "dark" : "light"));
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Fraunces:opsz,wght@9..144,500;9..144,650&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="hero section" id="top">
      <div class="container">
        <article class="hero-copy">
          <p class="eyebrow">404</p>
          <h1>Page not found</h1>
          <p class="hero-lead">This route does not exist on the site.</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="./">Back to Home</a>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch color mode" aria-pressed="false">
              <span class="theme-toggle-label">Theme</span>
              <strong id="themeLabel">Light</strong>
            </button>
          </div>
        </article>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
